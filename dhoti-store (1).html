<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VASTRA — Premium Dhoti Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #FAF6EE; --warm-white: #FDF9F3; --gold: #C9963A; --gold-light: #E8B84B;
  --gold-pale: #F5E6C8; --brown: #3D2B1F; --brown-mid: #6B4C35; --brown-light: #9C7B5E;
  --rust: #B5451B; --sage: #7A8C6E; --off-black: #1A120B;
  --font-serif: 'Playfair Display', serif; --font-sans: 'Jost', sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--cream); color: var(--brown); overflow-x: hidden; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
#root { min-height: 100vh; }

.tag { display:inline-flex;align-items:center;gap:8px;font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold); }
.tag::before { content:'';width:28px;height:1px;background:var(--gold); }
.btn { display:inline-flex;align-items:center;gap:10px;padding:14px 32px;font-family:var(--font-sans);font-weight:600;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .3s cubic-bezier(.25,.8,.25,1); }
.btn-gold { background:var(--gold);color:#fff; }
.btn-gold:hover { background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,150,58,.35); }
.btn-outline { background:transparent;border:1.5px solid var(--brown);color:var(--brown); }
.btn-outline:hover { background:var(--brown);color:var(--cream);transform:translateY(-2px); }
.btn-white { background:#fff;color:var(--brown); }
.btn-white:hover { background:var(--gold-pale);transform:translateY(-2px); }
.btn-full { width:100%;justify-content:center; }

/* NAV */
.nav { position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(250,246,238,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,150,58,.2);transition:all .3s; }
.nav-inner { max-width:1300px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:72px; }
.nav-logo { font-family:var(--font-serif);font-size:1.7rem;font-weight:900;color:var(--brown);letter-spacing:-.02em;text-decoration:none;display:flex;align-items:baseline;gap:3px;cursor:pointer; }
.nav-logo span { color:var(--gold);font-size:2rem; }
.nav-links { display:flex;gap:36px;list-style:none; }
.nav-links a { font-size:.82rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--brown-mid);text-decoration:none;transition:color .2s;position:relative;cursor:pointer; }
.nav-links a::after { content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:var(--gold);transition:width .3s; }
.nav-links a:hover { color:var(--gold); }
.nav-links a:hover::after { width:100%; }
.nav-actions { display:flex;align-items:center;gap:4px; }
.icon-btn { width:40px;height:40px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--brown);transition:color .2s;position:relative;border-radius:50%; }
.icon-btn:hover { color:var(--gold);background:var(--gold-pale); }
.badge { position:absolute;top:4px;right:4px;width:17px;height:17px;border-radius:50%;background:var(--rust);color:#fff;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center; }
.hamburger-btn { display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px; }
.hamburger-btn span { width:22px;height:2px;background:var(--brown);display:block;transition:.3s; }

/* SEARCH */
.search-bar-wrap { position:fixed;top:72px;left:0;right:0;z-index:190;background:var(--warm-white);border-bottom:2px solid var(--gold);transform:translateY(-110%);transition:transform .35s cubic-bezier(.25,.8,.25,1);box-shadow:0 8px 32px rgba(61,43,31,.12); }
.search-bar-wrap.open { transform:translateY(0); }
.search-bar-inner { max-width:700px;margin:0 auto;padding:20px 40px;display:flex;align-items:center;gap:14px;position:relative; }
.search-input { flex:1;border:none;outline:none;font-family:var(--font-serif);font-size:1.3rem;font-weight:400;color:var(--brown);background:transparent; }
.search-input::placeholder { color:var(--brown-light);font-style:italic; }
.search-results-dropdown { position:absolute;top:100%;left:0;right:0;background:#fff;border-top:1px solid var(--gold-pale);max-height:340px;overflow-y:auto;box-shadow:0 12px 32px rgba(61,43,31,.12);z-index:10; }
.search-result-item { display:flex;align-items:center;gap:16px;padding:14px 40px;cursor:pointer;transition:background .2s; }
.search-result-item:hover { background:var(--gold-pale); }
.sri-emoji { font-size:2rem;width:44px;text-align:center; }
.sri-name { font-family:var(--font-serif);font-weight:600;font-size:.95rem;color:var(--brown); }
.sri-cat { font-size:.72rem;color:var(--brown-light);letter-spacing:.08em; }
.sri-price { margin-left:auto;font-weight:700;color:var(--gold); }
.search-empty { padding:32px 40px;text-align:center;color:var(--brown-light);font-style:italic;font-family:var(--font-serif); }

/* HERO */
.hero { min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:72px;overflow:hidden;position:relative; }
.hero-left { background:var(--brown);display:flex;flex-direction:column;justify-content:center;padding:80px 60px 80px 80px;position:relative; }
.hero-left::before { content:'';position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);background-size:20px 20px; }
.hero-left-inner { position:relative;z-index:1; }
.hero-eyebrow { color:var(--gold-light);margin-bottom:24px; }
.hero-eyebrow::before { background:var(--gold-light); }
.hero-title { font-family:var(--font-serif);font-size:clamp(2.8rem,4.5vw,5rem);font-weight:900;line-height:1.05;letter-spacing:-.03em;color:var(--cream);margin-bottom:24px; }
.hero-title em { font-style:italic;color:var(--gold-light); }
.hero-sub { color:rgba(250,246,238,.65);font-weight:300;font-size:1rem;line-height:1.75;max-width:400px;margin-bottom:40px; }
.hero-cta { display:flex;gap:14px;flex-wrap:wrap;margin-bottom:56px; }
.hero-stats { display:flex;gap:40px;padding-top:36px;border-top:1px solid rgba(255,255,255,.12); }
.hero-stat-num { font-family:var(--font-serif);font-size:1.9rem;font-weight:700;color:var(--gold-light);line-height:1; }
.hero-stat-label { font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,246,238,.5);margin-top:4px; }
.hero-right { background:var(--warm-white);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:40px; }
.hero-right::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 50% 50%,rgba(201,150,58,.08) 0%,transparent 70%); }
.hero-fabric-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:460px;width:100%;position:relative;z-index:1; }
.fabric-card { border-radius:2px;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(61,43,31,.15);transition:transform .4s;cursor:pointer; }
.fabric-card:hover { transform:scale(1.03); }
.fabric-card:first-child { grid-row:span 2;border-radius:3px; }
.fabric-swatch { width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative; }
.fabric-card:first-child .fabric-swatch { aspect-ratio:2/3;font-size:6rem; }
.fabric-label { position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(61,43,31,.85) 0%,transparent 100%);padding:24px 16px 14px;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#fff; }
.hero-badge { position:absolute;top:24px;right:24px;z-index:2;background:var(--rust);color:#fff;width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-align:center;animation:slowSpin 12s linear infinite; }
@keyframes slowSpin { to { transform:rotate(360deg); } }

/* MARQUEE */
.marquee-wrap { background:var(--gold);overflow:hidden;padding:12px 0; }
.marquee-track { display:flex;gap:0;animation:marquee 25s linear infinite;white-space:nowrap; }
.marquee-item { padding:0 28px;font-size:.72rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#fff;display:inline-flex;align-items:center;gap:14px; }
.marquee-item::after { content:'✦';font-size:.55rem;color:rgba(255,255,255,.6); }
@keyframes marquee { from{transform:translateX(0)}to{transform:translateX(-50%)} }

/* SECTIONS */
.section { padding:100px 40px;max-width:1300px;margin:0 auto; }
.section-header { text-align:center;margin-bottom:64px; }
.section-title { font-family:var(--font-serif);font-size:clamp(2rem,3.5vw,3rem);font-weight:700;letter-spacing:-.03em;color:var(--brown);margin-bottom:12px; }
.section-sub { color:var(--brown-light);font-weight:300;font-size:.95rem;max-width:480px;margin:0 auto;line-height:1.7; }

/* CATEGORIES */
.categories-section { background:var(--warm-white);padding:100px 0; }
.cat-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-width:1300px;margin:0 auto;padding:0 40px; }
.cat-card { position:relative;overflow:hidden;cursor:pointer;background:var(--cream);transition:all .4s; }
.cat-card:hover .cat-overlay { opacity:1; }
.cat-card:hover .cat-content { transform:translateY(0);opacity:1; }
.cat-visual { aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:4rem;background:linear-gradient(160deg,var(--gold-pale),var(--cream));transition:transform .5s; }
.cat-card:hover .cat-visual { transform:scale(1.05); }
.cat-overlay { position:absolute;inset:0;background:linear-gradient(0deg,rgba(61,43,31,.8) 0%,rgba(61,43,31,.2) 60%,transparent 100%);opacity:0;transition:opacity .4s;display:flex;align-items:flex-end;padding:20px; }
.cat-content { color:#fff;transform:translateY(12px);opacity:0;transition:all .4s;width:100%; }
.cat-name { font-family:var(--font-serif);font-weight:700;font-size:1.1rem;margin-bottom:4px; }
.cat-count { font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;opacity:.75; }

/* PRODUCTS */
.products-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px; }
.product-card { background:var(--warm-white);position:relative;cursor:pointer;transition:transform .3s,box-shadow .3s;overflow:hidden;border:1px solid rgba(201,150,58,.1); }
.product-card:hover { transform:translateY(-6px);box-shadow:0 20px 60px rgba(61,43,31,.15); }
.product-img { aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:5rem;background:linear-gradient(160deg,var(--gold-pale) 0%,var(--cream) 100%);position:relative;overflow:hidden; }
.product-img::after { content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(201,150,58,.12),transparent 70%); }
.product-badge-wrap { position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:6px; }
.p-badge { padding:4px 10px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase; }
.p-badge-new { background:var(--sage);color:#fff; }
.p-badge-sale { background:var(--rust);color:#fff; }
.p-badge-best { background:var(--gold);color:#fff; }
.product-actions { position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;transform:translateX(56px);transition:transform .35s; }
.product-card:hover .product-actions { transform:translateX(0); }
.p-action { width:38px;height:38px;background:#fff;border:1px solid rgba(201,150,58,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;transition:all .2s;border-radius:50%; }
.p-action:hover { background:var(--gold);color:#fff;border-color:var(--gold); }
.product-info { padding:20px 20px 24px; }
.product-category { font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:600; }
.product-name { font-family:var(--font-serif);font-weight:700;font-size:1.1rem;color:var(--brown);margin-bottom:8px;line-height:1.3; }
.product-fabric { font-size:.78rem;color:var(--brown-light);margin-bottom:12px; }
.product-stars { display:flex;gap:2px;margin-bottom:8px;align-items:center; }
.star { font-size:.75rem; }
.product-footer { display:flex;align-items:center;justify-content:space-between;margin-top:12px; }
.price { font-family:var(--font-serif);font-weight:700;font-size:1.25rem;color:var(--brown); }
.price-old { font-size:.85rem;color:var(--brown-light);text-decoration:line-through;font-weight:400;margin-right:6px; }
.add-to-cart { padding:9px 18px;background:var(--brown);color:var(--cream);font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all .25s; }
.add-to-cart:hover { background:var(--gold); }

/* PRODUCT MODAL */
.modal-overlay { position:fixed;inset:0;background:rgba(26,18,11,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px); }
.modal-overlay.open { opacity:1;pointer-events:all; }
.modal-box { background:var(--warm-white);max-width:900px;width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(32px) scale(.97);transition:transform .35s cubic-bezier(.25,.8,.25,1);display:grid;grid-template-columns:1fr 1fr; }
.modal-overlay.open .modal-box { transform:translateY(0) scale(1); }
.modal-close { position:absolute;top:16px;right:16px;z-index:10;width:36px;height:36px;border-radius:50%;background:var(--brown);color:#fff;border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s; }
.modal-close:hover { background:var(--rust); }
.modal-img { background:linear-gradient(160deg,var(--gold-pale),var(--cream));display:flex;align-items:center;justify-content:center;font-size:9rem;min-height:400px;position:relative; }
.modal-info { padding:48px 40px;overflow-y:auto; }
.modal-category { font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px; }
.modal-name { font-family:var(--font-serif);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--brown);margin-bottom:10px;line-height:1.2; }
.modal-fabric { font-size:.85rem;color:var(--brown-light);margin-bottom:16px; }
.modal-price { font-family:var(--font-serif);font-size:2rem;font-weight:800;color:var(--brown);margin-bottom:24px; }
.modal-desc { font-size:.9rem;color:var(--brown-mid);line-height:1.75;margin-bottom:28px;font-weight:300; }
.modal-label { font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brown);margin-bottom:10px; }
.size-options { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px; }
.size-btn { padding:8px 18px;border:1.5px solid rgba(61,43,31,.2);background:transparent;font-family:var(--font-sans);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--brown); }
.size-btn.active,.size-btn:hover { border-color:var(--gold);background:var(--gold);color:#fff; }
.color-options { display:flex;gap:10px;margin-bottom:28px; }
.color-dot { width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .2s; }
.color-dot.active { border-color:var(--brown); }
.modal-actions { display:flex;gap:12px;flex-wrap:wrap; }
.modal-features { margin-top:28px;padding-top:24px;border-top:1px solid rgba(201,150,58,.15);display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.mf-item { display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--brown-light); }

/* FABRIC STORY */
.fabric-story { background:var(--brown);padding:0;overflow:hidden; }
.fabric-story-inner { max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr; }
.fabric-text { padding:100px 80px;display:flex;flex-direction:column;justify-content:center; }
.fabric-text .tag { color:var(--gold-light); }
.fabric-text .tag::before { background:var(--gold-light); }
.fabric-story-title { font-family:var(--font-serif);font-size:clamp(2rem,3vw,3rem);font-weight:700;color:var(--cream);letter-spacing:-.03em;line-height:1.15;margin:16px 0 20px; }
.fabric-story-title em { font-style:italic;color:var(--gold-light); }
.fabric-story-desc { color:rgba(250,246,238,.6);font-weight:300;line-height:1.8;margin-bottom:36px; }
.fabric-features { display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px; }
.feature-item { display:flex;align-items:flex-start;gap:12px; }
.feature-icon { font-size:1.4rem;margin-top:2px; }
.feature-title { font-size:.82rem;font-weight:600;color:var(--cream);letter-spacing:.04em;margin-bottom:4px; }
.feature-desc { font-size:.75rem;color:rgba(250,246,238,.5);line-height:1.5; }
.fabric-visual { background:linear-gradient(160deg,var(--brown-mid) 0%,var(--brown) 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:500px; }
.fabric-visual::before { content:'';position:absolute;inset:0;opacity:.08;background-image:repeating-linear-gradient(0deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 24px),repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 24px); }
.fabric-emoji-big { font-size:10rem;position:relative;z-index:1;animation:float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)} }

/* TESTIMONIALS */
.testimonials-section { background:var(--gold-pale);padding:100px 0; }
.testimonials-inner { max-width:1300px;margin:0 auto;padding:0 40px; }
.testimonials-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:24px; }
.testimonial-card { background:#fff;padding:36px;border-left:3px solid var(--gold);transition:transform .3s; }
.testimonial-card:hover { transform:translateY(-4px); }
.t-stars { display:flex;gap:3px;margin-bottom:16px; }
.t-text { font-family:var(--font-serif);font-style:italic;font-size:1.05rem;color:var(--brown);line-height:1.7;margin-bottom:20px; }
.t-author { display:flex;align-items:center;gap:12px; }
.t-avatar { width:44px;height:44px;border-radius:50%;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-size:1.3rem; }
.t-name { font-weight:600;font-size:.85rem;color:var(--brown); }
.t-location { font-size:.72rem;color:var(--brown-light);letter-spacing:.06em; }

/* OFFER */
.offer-section { background:var(--rust);padding:80px 40px;text-align:center;position:relative;overflow:hidden; }
.offer-section::before { content:'';position:absolute;inset:0;opacity:.06;background:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 36px); }
.offer-inner { position:relative;z-index:1;max-width:700px;margin:0 auto; }
.offer-title { font-family:var(--font-serif);font-size:clamp(2rem,4vw,3.5rem);font-weight:900;color:#fff;letter-spacing:-.04em;margin-bottom:12px; }
.offer-desc { color:rgba(255,255,255,.75);margin-bottom:32px;font-weight:300;font-size:1rem; }
.offer-code { display:inline-block;background:rgba(255,255,255,.15);border:1.5px dashed rgba(255,255,255,.5);padding:10px 24px;font-family:var(--font-serif);font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:.1em;margin-bottom:28px; }

/* NEWSLETTER */
.newsletter-section { background:var(--brown);padding:80px 40px; }
.newsletter-inner { max-width:600px;margin:0 auto;text-align:center; }
.newsletter-title { font-family:var(--font-serif);font-size:2.2rem;font-weight:700;color:var(--cream);letter-spacing:-.03em;margin-bottom:12px; }
.newsletter-sub { color:rgba(250,246,238,.55);font-weight:300;margin-bottom:32px; }
.newsletter-form { display:flex;gap:0;max-width:460px;margin:0 auto; }
.newsletter-form input { flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);padding:14px 20px;color:var(--cream);font-family:var(--font-sans);font-size:.9rem;outline:none;transition:border-color .2s; }
.newsletter-form input:focus { border-color:var(--gold); }
.newsletter-form input::placeholder { color:rgba(250,246,238,.35); }
.newsletter-form button { padding:14px 26px;background:var(--gold);color:#fff;border:none;cursor:pointer;font-family:var(--font-sans);font-size:.82rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;transition:background .2s; }
.newsletter-form button:hover { background:var(--gold-light); }

/* FOOTER */
footer { background:var(--off-black);padding:72px 40px 36px; }
.footer-inner { max-width:1300px;margin:0 auto; }
.footer-grid { display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:56px;margin-bottom:56px; }
.footer-desc { color:rgba(250,246,238,.4);font-size:.85rem;line-height:1.75;max-width:260px;margin-bottom:24px; }
.footer-social { display:flex;gap:10px; }

/* ── SEARCH BAR ── */
function SearchBar({open,onClose,onViewProduct}) {
  const [query,setQuery]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{if(open){setQuery("");setTimeout(()=>inputRef.current?.focus(),200);}},[open]);
  const results=useMemo(()=>{
    if(!query.trim()) return [];
    const q=query.toLowerCase();
    return PRODUCTS.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||p.fabric.toLowerCase().includes(q)).slice(0,6);
  },[query]);
  return (
    <div className={`search-bar-wrap ${open?"open":""}`}>
      <div className="search-bar-inner">
        <span style={{fontSize:"1.3rem",color:"var(--gold)"}}>🔍</span>
        <input ref={inputRef} className="search-input" placeholder="Search dhoties, fabrics, occasions…" value={query} onChange={e=>setQuery(e.target.value)} />
        <button onClick={()=>{onClose();setQuery("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.2rem",color:"var(--brown-light)"}}>✕</button>
        {(results.length>0||(query.trim()&&results.length===0))&&(
          <div className="search-results-dropdown">
            {results.length===0
              ?<div className="search-empty">No results for "{query}" — try "silk" or "wedding"</div>

function AuthModal({open,onClose,onLogin}) {
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({name:"",email:"",phone:"",password:"",confirm:""});
  const [success,setSuccess]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{if(!open){setSuccess(false);setTab("login");setForm({name:"",email:"",phone:"",password:"",confirm:""});}},[open]);
  const handleSubmit=()=>{
    if(!form.email||!form.password) return;
    const name=tab==="register"?(form.name||form.email.split("@")[0]):form.email.split("@")[0];
    onLogin({name,email:form.email});
    setSuccess(true);

    <div className={`auth-modal ${open?"open":""}`} onClick={e=>e.target===e.currentTarget&&onClose()}>

              <button className={`auth-tab ${tab==="login"?"active":""}`} onClick={()=>setTab("login")}>Sign In</button>
              <button className={`auth-tab ${tab==="register"?"active":""}`} onClick={()=>setTab("register")}>Register</button>
            </div>
            {tab==="login"?(
              <>
                <div className="form-group"><label className="form-label">Email Address</label><input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
                <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="Enter password" value={form.password} onChange={e=>set("password",e.target.value)}/><span className="forgot-link">Forgot password?</span></div>
                <button className="btn btn-gold btn-full" onClick={handleSubmit}>Sign In →</button>
                <div className="auth-divider">or continue with</div>
                <div className="social-login">
                  <button className="social-login-btn">🌐 Google</button>
                  <button className="social-login-btn">📘 Facebook</button>
                </div>
                <p className="auth-switch">New to VASTRA? <span onClick={()=>setTab("register")}>Create account</span></p>
              </>
            ):(
              <>
                <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Ramesh Kumar" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
                <div className="form-row">
                  <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="email@example.com" value={form.email} onChange={e=>set("email",e.target.value)}/></div>
                  <div className="form-group"><label className="form-label">Phone</label><input className="form-input" type="tel" placeholder="+91 98765 43210" value={form.phone} onChange={e=>set("phone",e.target.value)}/></div>
                </div>

    <div className={`checkout-modal ${open?"open":""}`} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="checkout-box">
        <button className="modal-close" onClick={onClose} style={{position:"absolute",top:16,right:16,zIndex:10}}>✕</button>
        {/* LEFT */}
        <div className="checkout-left">
          <div className="checkout-steps">
            {steps.map((s,i)=><div key={s} className={`checkout-step ${step===i+1?"active":step>i+1?"done":""}`}>{step>i+1?"✓ ":""}{s}</div>)}
          </div>
          {step===4?(
            <div className="checkout-success">
              <div className="checkout-success-icon">🎉</div>
              <h2>Order Placed!</h2>
              <p>Your dhoti(s) are being carefully packed and will be shipped within 24 hours.</p>
              <div className="order-id">#{orderId}</div>
              <p style={{marginTop:12,fontSize:".82rem"}}>You will receive a confirmation SMS & email shortly.</p>
              <button className="btn btn-gold" style={{marginTop:24}} onClick={onClose}>Continue Shopping</button>
            </div>
          ):step===1?(
            <>
              <div className="checkout-step-title">📍 Delivery Address</div>
              <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Ramesh Kumar" value={addr.name} onChange={e=>setA("name",e.target.value)}/></div>
              <div className="form-group"><label className="form-label">Phone Number</label><input className="form-input" type="tel" placeholder="+91 98765 43210" value={addr.phone} onChange={e=>setA("phone",e.target.value)}/></div>
              <div className="form-group"><label className="form-label">Address Line 1</label><input className="form-input" placeholder="House No., Street Name" value={addr.line1} onChange={e=>setA("line1",e.target.value)}/></div>
              <div className="form-group"><label className="form-label">Address Line 2 (Optional)</label><input className="form-input" placeholder="Area, Landmark" value={addr.line2} onChange={e=>setA("line2",e.target.value)}/></div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">City</label><input className="form-input" placeholder="Chennai" value={addr.city} onChange={e=>setA("city",e.target.value)}/></div>
                <div className="form-group"><label className="form-label">State</label><input className="form-input" placeholder="Tamil Nadu" value={addr.state} onChange={e=>setA("state",e.target.value)}/></div>
              </div>
              <div className="form-group"><label className="form-label">PIN Code</label><input className="form-input" placeholder="600001" value={addr.pin} onChange={e=>setA("pin",e.target.value)}/></div>
              <button className="btn btn-gold btn-full" onClick={()=>setStep(2)}>Continue to Payment →</button>
            </>
          ):step===2?(
            <>
              <div className="checkout-step-title">💳 Payment Method</div>
              <div className="payment-methods">
                {[["upi","📱 UPI / QR","GPay, PhonePe, Paytm"],["card","💳 Credit / Debit Card","Visa, Mastercard, RuPay"],["netbank","🏦 Net Banking","All major Indian banks"],["cod","📦 Cash on Delivery","Pay when delivered"]].map(([v,l,s])=>(
                  <label key={v} className={`pay-method ${payMethod===v?"selected":""}`} onClick={()=>setPayMethod(v)}>
                    <input type="radio" checked={payMethod===v} onChange={()=>setPayMethod(v)}/>
                    <div><div className="pay-method-label">{l}</div><div className="pay-method-sub">{s}</div></div>
                  </label>
                ))}
              </div>
              {payMethod==="card"&&(
                <div style={{background:"#fff",padding:20,marginBottom:20,border:"1px solid rgba(201,150,58,.15)"}}>
                  <div className="form-group"><label className="form-label">Card Number</label><input className="form-input" placeholder="1234 5678 9012 3456"/></div>
                  <div className="form-row">
                    <div className="form-group"><label className="form-label">Expiry</label><input className="form-input" placeholder="MM / YY"/></div>
                    <div className="form-group"><label className="form-label">CVV</label><input className="form-input" placeholder="•••"/></div>
                  </div>
                  <div className="form-group"><label className="form-label">Name on Card</label><input className="form-input" placeholder="Ramesh Kumar"/></div>
                </div>
              )}
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-outline" onClick={()=>setStep(1)} style={{flex:1,justifyContent:"center"}}>← Back</button>
                <button className="btn btn-gold" onClick={()=>setStep(3)} style={{flex:2,justifyContent:"center"}}>Review Order →</button>
              </div>
            </>
          ):step===3?(
            <>
              <div className="checkout-step-title">✅ Review & Place Order</div>
              <div style={{background:"#fff",padding:16,marginBottom:16,border:"1px solid rgba(201,150,58,.1)",fontSize:".85rem"}}>
                <div style={{fontWeight:700,marginBottom:6,color:"var(--brown)"}}>📍 Delivering to:</div>
                <div style={{color:"var(--brown-mid)"}}>{addr.name||"Ramesh Kumar"} · {addr.phone||"+91 98765 43210"}</div>
                <div style={{color:"var(--brown-light)"}}>{addr.line1||"123, Main Street"}, {addr.city||"Chennai"}, {addr.state||"Tamil Nadu"} {addr.pin||"600001"}</div>
              </div>
              <div style={{background:"#fff",padding:16,marginBottom:20,border:"1px solid rgba(201,150,58,.1)",fontSize:".85rem"}}>
                <div style={{fontWeight:700,marginBottom:6,color:"var(--brown)"}}>💳 Payment via:</div>
                <div style={{color:"var(--brown-mid)"}}>{{"upi":"UPI / QR Code","card":"Credit/Debit Card","netbank":"Net Banking","cod":"Cash on Delivery"}[payMethod]}</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-outline" onClick={()=>setStep(2)} style={{flex:1,justifyContent:"center"}}>← Back</button>
                <button className="btn btn-gold" onClick={()=>setStep(4)} style={{flex:2,justifyContent:"center"}}>🎉 Place Order</button>
              </div>
            </>
          ):null}
        </div>
        {/* RIGHT — Order Summary */}
        <div className="checkout-right">
          <div className="checkout-step-title" style={{marginBottom:20}}>🧾 Order Summary</div>
          <div style={{marginBottom:20}}>
            {cart.map(item=>(
              <div key={item.id} className="order-item">
                <div className="order-item-img">{item.emoji}<div className="order-item-qty">{item.qty}</div></div>
                <div><div className="order-item-name">{item.name}</div><div className="order-item-fabric">{item.fabric}</div></div>
                <div className="order-item-price">₹{(item.price*item.qty).toLocaleString()}</div>
              </div>
            ))}
          </div>
          <div className="coupon-row">
            <input placeholder="Coupon code (try VIVAH20)" value={coupon} onChange={e=>setCoupon(e.target.value)}/>
            <button onClick={applyCoupon}>Apply</button>
          </div>
          {discount>0&&<div style={{background:"rgba(122,140,110,.1)",border:"1px solid var(--sage)",padding:"8px 14px",fontSize:".8rem",color:"var(--sage)",fontWeight:600,marginBottom:12}}>✓ You save ₹{discount.toLocaleString()}!</div>}
          <div>
            <div className="order-summary-row"><span>Subtotal</span><span>₹{subtotal.toLocaleString()}</span></div>
            <div className="order-summary-row"><span>Shipping</span><span>{shipping===0?"FREE":"₹"+shipping}</span></div>
            {discount>0&&<div className="order-summary-row" style={{color:"var(--sage)"}}><span>Discount</span><span>−₹{discount.toLocaleString()}</span></div>}
            <div className="order-summary-total"><span>Total</span><span>₹{total.toLocaleString()}</span></div>
          </div>
          <div style={{marginTop:20,padding:14,background:"rgba(201,150,58,.06)",border:"1px solid rgba(201,150,58,.2)",fontSize:".78rem",color:"var(--brown-light)"}}>
            🔒 Secure checkout · 🚚 Delivery in 3–5 days · ↩️ 7-day returns
          </div>
        </div>
      </div>
    </div>
  );
}

function Toast({message,show}) {
  return <div className={`toast ${show?"show":""}`}>✓ {message}</div>;
}

/* ── APP ── */
function App() {
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [mobileOpen,setMobileOpen]=useState(false);
  const [toast,setToast]=useState({show:false,msg:""});
  const [searchOpen,setSearchOpen]=useState(false);
  const [authOpen,setAuthOpen]=useState(false);
  const [checkoutOpen,setCheckoutOpen]=useState(false);
  const [selectedProduct,setSelectedProduct]=useState(null);
  const [user,setUser]=useState(null);
  const [activeFilter,setActiveFilter]=useState("All");

  const showToast=(msg)=>{setToast({show:true,msg});setTimeout(()=>setToast({show:false,msg:""}),2800);};
  const addToCart=(product,qty=1)=>{
    setCart(prev=>{
      const ex=prev.find(i=>i.id===product.id);
      if(ex) return prev.map(i=>i.id===product.id?{...i,qty:i.qty+qty}:i);
      return [...prev,{...product,qty}];
    });
    showToast(`${product.name} added to bag!`);
  };
  const changeQty=(id,delta)=>setCart(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+delta)}:i));
  const removeItem=(id)=>setCart(prev=>prev.filter(i=>i.id!==id));
  const scrollToShop=()=>document.getElementById("shop")?.scrollIntoView({behavior:"smooth"});

  useEffect(()=>{
    const els=document.querySelectorAll(".reveal");
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("in-view");}),{threshold:.12});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);

  useEffect(()=>{
    const fn=(e)=>{if(e.key==="Escape"){setSearchOpen(false);setAuthOpen(false);setCheckoutOpen(false);setSelectedProduct(null);}};
    window.addEventListener("keydown",fn);
    return()=>window.removeEventListener("keydown",fn);
  },[]);

  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  return (
    <>
      <Nav cartCount={cartCount} onCartOpen={()=>setCartOpen(true)} mobileOpen={mobileOpen}
        onMobileToggle={()=>setMobileOpen(o=>!o)} onSearchOpen={()=>setSearchOpen(o=>!o)}
        onAuthOpen={()=>setAuthOpen(true)} user={user}/>
      <SearchBar open={searchOpen} onClose={()=>setSearchOpen(false)} onViewProduct={p=>{setSelectedProduct(p);setSearchOpen(false);}}/>
      <Hero onShopClick={scrollToShop}/>
      <Marquee/>
      <Categories onCategoryClick={cat=>{
        if(cat==="Silk"||cat==="Cotton"){setActiveFilter("All");}else{setActiveFilter(cat);}
        scrollToShop();
      }}/>
      <Products onAdd={addToCart} onView={setSelectedProduct} activeFilter={activeFilter} setActiveFilter={setActiveFilter}/>
      <FabricStory/>
      <Testimonials/>
      <OfferBanner onShopClick={()=>{setActiveFilter("Wedding");scrollToShop();}}/>
      <Newsletter/>
      <Footer/>
      <CartSidebar cart={cart} onClose={()=>setCartOpen(false)} isOpen={cartOpen} onQty={changeQty} onRemove={removeItem} onCheckout={()=>{setCartOpen(false);setCheckoutOpen(true);}}/>
      <ProductModal product={selectedProduct} onClose={()=>setSelectedProduct(null)} onAdd={addToCart}/>
      <AuthModal open={authOpen} onClose={()=>setAuthOpen(false)} onLogin={u=>setUser(u)}/>
      <CheckoutModal open={checkoutOpen} onClose={()=>setCheckoutOpen(false)} cart={cart}/>
      <Toast message={toast.msg} show={toast.show}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
